<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>Basic Information</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
    }

    .container {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ddd;
      max-width: 600px;
      margin: 0 auto;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 30px;
      font-size: 24px;
    }

    .details {
      margin-bottom: 20px;
      font-size: 16px;
    }

    .details p {
      margin-bottom: 15px;
      font-weight: 500;
    }

    .details p strong {
      color: #333;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input[type="text"]:disabled,
    input[type="email"]:disabled {
      background-color: #f5f5f5;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
      text-align: center;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      box-sizing: border-box;
    }

    .btn.cancel {
      background: #f44336;
      margin-top: 10px;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .alert {
      color: #d9534f;
      text-align: center;
      margin-top: 20px;
      font-size: 16px;
    }

    /* Small screen styling for mobile responsiveness */
    @media (max-width: 600px) {
      .container {
        padding: 15px;
        width: 90%;
      }

      .btn {
        padding: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>基本情報/Basic Information</h2>

    <div class="details">
      <p><strong>時間：</strong><span id="time-slot"></span></p>
      <p><strong>日程：</strong><span id="date"></span></p>
      <p><strong>名前/Name(alphapet)：</strong><input type="text" id="name" placeholder="Name(alphapet)" required></p>
      <p><strong>名前/Name(katakana)：</strong><input type="text" id="kana" placeholder="Name(katakana)" required></p>
      <p><strong>国籍・地域/Nationality・Region：</strong><input type="text" id="kana" placeholder="Nationality・Region" required></p>
      <p><strong>身分/Status：</strong><input type="text" id="kana" placeholder="Status" required></p>
      <!-- J：JUSST Program student
RS：研究生 / Research student
D：博士後期課程学生 / Ph. D. student
M：博士前期課程学生 / Master student
S：配偶者 / Spouse 
      -->
      <p><strong>メールアドレス/mail：</strong><input type="email" id="email" placeholder="mail" required></p>
    </div>

    <a href="index.html" class="btn cancel">戻る/BACK</a>
    <button id="confirm" class="btn">確定/OK</button>

    <div id="alert-message" class="alert"></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // 创建 Supabase 客户端
    const SUPABASE_URL = "https://iodijnhbxihastuknqky.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZGlqbmhieGloYXN0dWtucWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4NjgyNTIsImV4cCI6MjA4NTQ0NDI1Mn0.PTG1s0Zv14VX-yfrZNmJqyu-R7wlvJl3_YYcq40g6Y4";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 从 URL 中获取时间段和日期信息
    const urlParams = new URLSearchParams(window.location.search);
    const timeSlot = urlParams.get('time');
    const date = urlParams.get('date');

    // 获取选课详情
    document.getElementById("time-slot").textContent = timeSlot;
    document.getElementById("date").textContent = date;

    // 插入前检查是否有两条记录
    async function checkEnrollmentExistence() {
      const { count, error } = await supabaseClient
        .from("enrollments")
        .select("*", { count: "exact" })
        .eq("time_slot", timeSlot)
        .eq("date", date);

      if (error) {
        console.error("查询失败:", error.message);
        return false;
      }

      if (count >= 2) {
        document.getElementById("alert-message").textContent = "この時間帯は満席です。ほかの時間を選択してください。/Fully booked. Choose another time.";
        setTimeout(() => {
          window.location.href = "index.html"; // 戻る/BACK
        }, 3000); // 等待3秒后返回
        return false;
      }

      return true;
    }

    // 点击确认选课按钮时执行
    document.getElementById("confirm").onclick = async () => {
      const name = document.getElementById("name").value;
      const kana = document.getElementById("kana").value;
      const email = document.getElementById("email").value;

      if (!name || !kana || !email) {
        alert("すべての項目を入力してください。/Please fill in all fields.！");
        return;
      }

      const canInsert = await checkEnrollmentExistence();
      if (!canInsert) return;  // 如果已有两条记录，直接返回

      const { data, error } = await supabaseClient
        .from("enrollments")
        .insert([{
          time_slot: timeSlot,
          date: date,
          name: name,
          kana: kana,
          email: email
        }]);

      if (error) {
        console.error("插入失败:", error.message);
        alert("予約に失敗しました。再度お試しください。/Booking failed. Please try again.");
      } else {
        alert("予約完了/Reservation successful");
        window.location.href = "index.html"; // 返回到首页
      }
    };
  </script>

</body>

</html>
