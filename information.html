<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>Basic Information</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
    }

    .container {
      margin: 30px auto;
      padding: 25px;
      border: 1px solid #ddd;
      max-width: 600px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 25px;
    }

    .details p {
      margin-bottom: 15px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      box-sizing: border-box;
      margin-top: 15px;
      transition: background 0.2s ease;
    }

    .btn.primary {
      background: #4CAF50;
      color: white;
    }

    .btn.primary:hover {
      background: #45a049;
    }

    .btn.cancel {
      background: #f44336;
      color: white;
    }

    .btn.cancel:hover {
      background: #d32f2f;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .alert {
      color: #d9534f;
      text-align: center;
      margin-top: 15px;
    }

    footer {
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      font-size: 13px;
      color: #777;
    }

    @media (max-width: 600px) {
      .container {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>基本情報 / Basic Information</h2>

    <div class="details">
      <p><strong>時間：</strong><span id="time-slot"></span></p>
      <p><strong>日程：</strong><span id="date"></span></p>

      <p><strong>名前 / Name (alphabet)：</strong>
        <input type="text" id="name" placeholder="e.g. Yamada Taro" required>
      </p>

      <p><strong>名前 / Name (katakana)：</strong>
        <input type="text" id="kana" placeholder="ヤマダ タロウ" required>
      </p>

      <p><strong>国籍・地域 / Nationality・Region：</strong>
        <input type="text" id="nationality" placeholder="e.g. China / 日本 / Vietnam" required>
      </p>

      <p><strong>身分 / Status：</strong>
        <select id="status" required>
          <option value="">-- 選択してください / Please select --</option>
          <option value="J">J：JUSST Program student</option>
          <option value="RS">RS：研究生 / Research student</option>
          <option value="D">D：博士後期課程学生 / Ph. D. student</option>
          <option value="M">M：博士前期課程学生 / Master student</option>
          <option value="S">S：配偶者 / Spouse</option>
        </select>
      </p>

      <p><strong>メールアドレス / Mail：</strong>
        <input type="email" id="email" placeholder="example@email.com" required>
      </p>
    </div>

    <button id="back" class="btn cancel">戻る / BACK</button>
    <button id="confirm" class="btn primary">確定 / OK</button>

    <div id="alert-message" class="alert"></div>
  </div>

  <footer>
    © 2026 UEC University | Designed & Developed by HUYIQUN
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>

    const SUPABASE_URL = "https://iodijnhbxihastuknqky.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZGlqbmhieGloYXN0dWtucWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4NjgyNTIsImV4cCI6MjA4NTQ0NDI1Mn0.PTG1s0Zv14VX-yfrZNmJqyu-R7wlvJl3_YYcq40g6Y4";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const timeSlot = urlParams.get('time');
    const date = urlParams.get('date');

    document.getElementById("time-slot").textContent = timeSlot;
    document.getElementById("date").textContent = formatJapaneseDate(date);

    document.getElementById("back").onclick = () => {
      window.location.href = "index.html";
    };

    async function checkEnrollmentExistence() {
      const { count, error } = await supabaseClient
        .from("enrollments")
        .select("*", { count: "exact" })
        .eq("time_slot", timeSlot)
        .eq("date", date);

      if (error) {
        console.error("查询失败:", error.message);
        return false;
      }

      if (count >= 2) {
        document.getElementById("alert-message").textContent =
          "この時間帯は満席です。ほかの時間を選択してください。 /n Fully booked.";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 3000);
        return false;
      }

      return true;
    }

    document.getElementById("confirm").onclick = async () => {

      const name = document.getElementById("name").value;
      const kana = document.getElementById("kana").value;
      const nationality = document.getElementById("nationality").value;
      const status = document.getElementById("status").value;
      const email = document.getElementById("email").value;

      if (!name || !kana || !nationality || !status || !email) {
        alert("すべての項目を入力してください。 / Please fill in all fields.");
        return;
      }

      const canInsert = await checkEnrollmentExistence();
      if (!canInsert) return;

      const { error } = await supabaseClient
        .from("enrollments")
        .insert([{
          time_slot: timeSlot,
          date: date,
          name: name,
          kana: kana,
          nationality: nationality,
          status: status,
          email: email
        }]);

      if (error) {
        alert("予約に失敗しました。再度お試しください。");
      } else {
        alert("予約完了 / Reservation successful");
        window.location.href = "index.html";
      }
    };

function formatJapaneseDate(dateStr) {
  // dateStr 例如 "3/30"
  const [month, day] = dateStr.split("/").map(Number);

  // 2026年（可改成动态）
  const year = 2026;

  const dateObj = new Date(year, month - 1, day);

  const weekdays = ["Sun.", "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat."];
  const weekday = weekdays[dateObj.getDay()];

  return `${month}月${day}日(${weekday})`;
}
  </script>

</body>

</html>
