<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>予約キャンセル / Cancel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      color: #333;
    }

    .container {
      width: 95%;
      max-width: 1000px;
      margin: 30px auto;
      padding: 25px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #444;
    }

    .search-box {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    input[type="email"] {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background-color: #f4f4f4;
      color: #444;
    }

    .empty {
      text-align: center;
      margin-top: 20px;
      color: #888;
    }

    .actions {
      margin-top: 30px;
      text-align: center;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn.primary {
      background: #4CAF50;
      color: white;
    }

    .btn.primary:hover {
      background: #45a049;
    }

    .btn.cancel {
      background: #f44336;
      color: white;
    }

    .btn.cancel:hover {
      background: #d32f2f;
    }

    footer {
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      font-size: 13px;
      color: #777;
    }

    @media (max-width: 768px) {
      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>予約キャンセル / Cancel Reservation</h2>

    <div class="search-box">
      <input type="email" id="email" placeholder="予約時のメールアドレス / Enter your reservation email">
      <button id="search" class="btn primary">検索 / Search</button>
    </div>

    <table id="result-table" style="display:none;">
      <thead>
        <tr>
          <th>日付</th>
          <th>時間</th>
          <th>名前 (alphabet)</th>
          <th>名前 (katakana)</th>
          <th>国籍・地域</th>
          <th>身分</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="empty" class="empty"></div>

    <div class="actions">
      <a href="index.html" class="btn cancel">← Topに戻る / BACK</a>
    </div>

  </div>

  <footer>
    © 2026 UEC University | Designed & Developed by HUYIQUN
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://iodijnhbxihastuknqky.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZGlqbmhieGloYXN0dWtucWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4NjgyNTIsImV4cCI6MjA4NTQ0NDI1Mn0.PTG1s0Zv14VX-yfrZNmJqyu-R7wlvJl3_YYcq40g6Y4";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const table = document.getElementById("result-table");
    const tbody = table.querySelector("tbody");
    const emptyDiv = document.getElementById("empty");

    document.getElementById("search").onclick = async () => {

      const email = document.getElementById("email").value.trim();

      if (!email) {
        alert("予約時のメールアドレスを入力してください。");
        return;
      }

      tbody.innerHTML = "";
      emptyDiv.textContent = "";
      table.style.display = "none";

      const { data, error } = await supabaseClient
        .from("enrollments")
        .select("*")
        .eq("email", email);

      if (error) {
        alert("エラーが発生しました。");
        console.error(error);
        return;
      }

      if (data.length === 0) {
        emptyDiv.textContent = "予約記録がありません。";
        return;
      }

      data.sort((a, b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        return a.time_slot.localeCompare(b.time_slot);
      });

      table.style.display = "table";

      data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${formatJapaneseDate(row.date)}</td>
          <td>${row.time_slot}</td>
          <td>${row.name}</td>
          <td>${row.kana}</td>
          <td>${row.nationality}</td>
          <td>${row.status}</td>
          <td><button class="btn cancel">キャンセル</button></td>
        `;

        tr.querySelector(".btn.cancel").onclick = () => cancelEnrollment(row);
        tbody.appendChild(tr);
      });
    };

    async function cancelEnrollment(row) {

      if (!confirm(`${row.date} ${row.time_slot} の予約をキャンセルしますか？`)) {
        return;
      }

      const { error } = await supabaseClient
        .from("enrollments")
        .delete()
        .eq("email", row.email)
        .eq("date", row.date)
        .eq("time_slot", row.time_slot);

      if (error) {
        alert("エラーが発生しました。");
        console.error(error);
      } else {
        alert("キャンセルしました。\nReservation cancelled.");
        document.getElementById("search").click();
      }
    }

function formatJapaneseDate(dateStr) {
  // dateStr 例如 "3/30"
  const [month, day] = dateStr.split("/").map(Number);

  // 2026年（可改成动态）
  const year = 2026;

  const dateObj = new Date(year, month - 1, day);

  const weekdays = ["Sun.", "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat."];
  const weekday = weekdays[dateObj.getDay()];

  return `${month}月${day}日(${weekday})`;
}

  </script>

</body>

</html>
